server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env
  datasource:
    # Neon : récupère l'URL JDBC dans ton dashboard Neon.
    # Exemple : jdbc:postgresql://ep-xxx.eu-central-1.aws.neon.tech/neondb?sslmode=require
    url: ${NEON_JDBC_URL:jdbc:postgresql://localhost:5432/novahexa}
    username: ${NEON_DB_USER:novahexa}
    password: ${NEON_DB_PASSWORD:novahexa}
  jpa:
    hibernate:
      ddl-auto: update          # crée/maj les tables automatiquement (dev)
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    mapper:
      accept-case-insensitive-enums: true   # 'route' -> ROUTE, 'jour_meme' -> JOUR_MEME
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

# Cloudinary : à renseigner pour activer l'upload des photos
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    email: ${ADMIN_EMAIL:admin@novahexa.local}
    password: ${ADMIN_PASSWORD:admin123}
