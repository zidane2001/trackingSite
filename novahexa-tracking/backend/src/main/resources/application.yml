server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  config:
    import:
      - optional:file:.env
  datasource:
    # Neon : récupère l'URL JDBC dans ton dashboard Neon.
    # Exemple : jdbc:postgresql://ep-xxx.eu-central-1.aws.neon.tech/neondb?sslmode=require
    url: ${NEON_JDBC_URL:jdbc:postgresql://localhost:5432/youmslogistics}
    username: ${NEON_DB_USER:youmslogistics}
    password: ${NEON_DB_PASSWORD:youmslogistics}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: UTC
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
  jackson:
    mapper:
      accept-case-insensitive-enums: true   # 'route' -> ROUTE, 'jour_meme' -> JOUR_MEME
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

# Cloudinary : à renseigner pour activer l'upload des photos
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# Resend : à renseigner pour activer l'envoi d'emails transactionnels
# Créer un compte sur https://resend.com et obtenir une clé API
resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:noreply@youmslogistic.fr}
  from-name: ${RESEND_FROM_NAME:Youms Logistics}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  geocoding:
    enabled: ${GEOCODING_ENABLED:true}
  admin:
    email: ${ADMIN_EMAIL:admin@novahexa.local}
    password: ${ADMIN_PASSWORD:admin123}
  keep-alive:
    url: ${KEEP_ALIVE_URL:}
